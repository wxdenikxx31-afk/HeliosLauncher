appId: 'unicraftlauncher'
productName: 'UniCraft Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 UniCraft'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: true
  perMachine: false
  allowElevation: true
  deleteAppDataOnUninstall: false

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux: 
  target: 'AppImage'
  maintainer: 'Daniel Scalzi'
  vendor: 'Daniel Scalzi'
  synopsis: 'UniCraft Modded Minecraft Launcher'
  description: 'UniCraft Launcher - custom launcher for modded Minecraft servers. All mods, configurations, and updates are handled automatically.'
  category: 'Game'


publish:
  - provider: 'github'
    owner: 'wxdenikxx31-afk'
    repo: 'HeliosLauncher'

directories:
  buildResources: 'build'
  output: 'dist'